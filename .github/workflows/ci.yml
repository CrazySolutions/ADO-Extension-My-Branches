name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Test, build and package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npx tfx extension create --manifest-globs vss-extension.json --no-prompt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-branches
          path: '*.vsix'
          if-no-files-found: error
